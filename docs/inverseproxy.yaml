# Traefik Reverse Proxy with Let's Encrypt
# Este archivo debe ejecutarse en el servidor de producción ANTES de iniciar Odoo
#
# Para iniciar: docker compose -f inverseproxy.yaml up -d
# Para ver logs: docker compose -f inverseproxy.yaml logs -f

version: "2.4"

services:
  traefik:
    image: docker.io/traefik:2.11
    restart: unless-stopped
    container_name: traefik
    command:
      # API y Dashboard (opcional, comentar en producción si no se necesita)
      - --api.dashboard=true
      - --api.insecure=false

      # Logs
      - --log.level=INFO
      - --accesslog=true

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=inverseproxy_shared

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # Redirect HTTP to HTTPS
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true

      # Let's Encrypt
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@aeroclubsanmartin.com.ar}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

      # Descomentar la siguiente línea para usar el servidor de staging de Let's Encrypt (testing)
      # - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory

    ports:
      - "80:80"
      - "443:443"
      # Puerto 8080 para el dashboard (comentar en producción si no se necesita)
      # - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt

    networks:
      - inverseproxy_shared

    labels:
      # Habilitar Traefik para sí mismo (para el dashboard)
      traefik.enable: "true"

      # Dashboard (comentar si no se necesita)
      # traefik.http.routers.traefik-dashboard.rule: Host(`traefik.aeroclubsanmartin.com.ar`)
      # traefik.http.routers.traefik-dashboard.service: api@internal
      # traefik.http.routers.traefik-dashboard.entrypoints: websecure
      # traefik.http.routers.traefik-dashboard.tls.certresolver: letsencrypt
      # traefik.http.routers.traefik-dashboard.middlewares: traefik-auth

      # Autenticación básica para el dashboard (user: admin, password: changeme)
      # Generar password con: echo $(htpasswd -nb admin tu_password) | sed -e s/\\$/\\$\\$/g
      # traefik.http.middlewares.traefik-auth.basicauth.users: admin:$$apr1$$xxx$$xxx

networks:
  inverseproxy_shared:
    name: inverseproxy_shared
    driver: bridge

volumes:
  traefik-certificates:
    name: traefik-certificates
